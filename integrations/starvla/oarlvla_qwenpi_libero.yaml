run_id: oarlvla_qwenpi_libero
run_root_dir: playground/Checkpoints
seed: 42
wandb_entity: your_wandb_entity
wandb_project: oarlvla_libero
is_debug: false
version_id: "oarlvla-starvla-0.1"

framework:
  name: OARLVLAQwenPI
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  oarl:
    object_feature_dim: 35
    region_feature_dim: 0
    num_relation_types: 8
    dropout: 0.1
    use_relation_graph: true
    target_loss_weight: 0.2
    fallback_single_scene_token: true
  action_model:
    action_model_type: LayerwiseFM
    action_dim: 7
    state_dim: 7
    action_horizon: 8
    repeated_diffusion_steps: 2
    num_inference_timesteps: 4

datasets:
  vlm_data:
    dataset_py: vlm_datasets
    dataformat: llava_json
    dataset_use: sharegpt4v_coco
    eval_dataset: sharegpt4v_coco
    data_flatten: false
    base_interval: 2
    max_pixels: 307200
    min_pixels: 784
    model_max_length: 2048
    model_type: qwen2.5vl
    per_device_batch_size: 4

  vla_data:
    dataset_py: lerobot_datasets
    data_root_dir: playground/Datasets/LEROBOT_LIBERO_DATA
    data_mix: libero_all
    action_type: delta_qpos
    sequential_step_sampling: false
    CoT_prompt: "Your task is {instruction}. Identify the key target object before action."
    per_device_batch_size: 16
    load_all_data_for_training: true
    video_backend: torchvision_av

trainer:
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 2.5e-05
    qwen_vl_interface: 1.0e-05
    oarl_core: 1.0e-04
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 1.0e-06
  freeze_modules: "qwen_vl_interface"
  loss_scale:
    vla: 1.0
    vlm: 0.1
  max_grad_norm: 1.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
